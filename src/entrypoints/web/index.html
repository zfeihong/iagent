<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OpenClaw Agent Web UI</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
        background: #0a0a0a;
        color: #e0e0e0;
        height: 100vh;
        display: flex;
        flex-direction: column;
      }

      header {
        background: #1a1a1a;
        padding: 1rem 2rem;
        border-bottom: 1px solid #2a2a2a;
        display: flex;
        align-items: center;
        justify-content: space-between;
      }

      header h1 {
        font-size: 1.25rem;
        font-weight: 600;
        color: #3b82f6;
      }

      .status {
        font-size: 0.875rem;
        display: flex;
        align-items: center;
        gap: 0.5rem;
      }

      .status-dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: #22c55e;
      }

      .status-dot.disconnected {
        background: #ef4444;
      }

      #app {
        flex: 1;
        display: flex;
        flex-direction: column;
        max-width: 1200px;
        margin: 0 auto;
        width: 100%;
        padding: 1rem;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>🤖 OpenClaw Agent</h1>
      <div class="status">
        <div class="status-dot" id="status-dot"></div>
        <span id="status-text">连接中...</span>
      </div>
    </header>

    <div id="app"></div>

    <script type="module" src="./main.ts"></script>
  </body>
</html>
